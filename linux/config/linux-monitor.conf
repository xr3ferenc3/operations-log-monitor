# =============================================================================
# linux-monitor.conf
# ops-log-monitor — Linux Monitor Configuration
# =============================================================================
#
# PURPOSE:
#   This file defines all configurable parameters for log-monitor.sh.
#   It is sourced by the main script at runtime using the dot (.) operator.
#   Every parameter an administrator is likely to need to adjust for their
#   environment lives here. The main script logic should never need to be
#   modified for routine customization.
#
# USAGE:
#   This file is not executed directly. It is sourced by log-monitor.sh.
#   To create a site-specific override without modifying this file:
#
#     cp linux-monitor.conf linux-monitor.conf.local
#     # Edit the local copy
#     # log-monitor.sh will source the local copy if it exists,
#     # overriding values set in this file.
#
#   Local override files match the pattern *.conf.local and are excluded
#   from version control by .gitignore. This allows site-specific settings
#   to coexist with repository updates without merge conflicts.
#
# SYNTAX:
#   This file uses standard bash variable assignment syntax.
#   String values must be quoted.
#   Arrays use bash array syntax: VARNAME=("value1" "value2")
#   Boolean values use the strings "true" and "false" (quoted).
#   The main script evaluates booleans with: [[ "$VAR" == "true" ]]
#
# SECTIONS:
#   1.  Output settings
#   2.  Monitoring window defaults
#   3.  Business hours definition
#   4.  Module enable/disable flags
#   5.  Log source paths
#   6.  Authentication thresholds
#   7.  Expected administrative accounts
#   8.  Security-relevant services and processes
#   9.  SELinux settings
#   10. Kernel message filters
#   11. Report metadata
#
# =============================================================================


# -----------------------------------------------------------------------------
# SECTION 1 — Output Settings
# -----------------------------------------------------------------------------

# OUTPUT_DIR: Directory where reports are written. Created if it does not
# exist. Use an absolute path in production deployments to avoid ambiguity
# when the script is run from different working directories or by cron.
#
# Relative path (suitable for development and testing):
OUTPUT_DIR="./output/reports"
#
# Absolute path examples for production:
# OUTPUT_DIR="/var/log/ops-log-monitor/reports"
# OUTPUT_DIR="/mnt/monitoring/reports/$(hostname -s)"

# OUTPUT_FORMATS: Which report formats to generate.
# Valid values: "markdown", "json", "both"
# "both" is the default and recommended for most environments.
OUTPUT_FORMATS="both"

# REPORT_FILENAME_PREFIX: Prefix applied to all generated report filenames.
# Reports are named: PREFIX-HOSTNAME-YYYYMMDD-HHMMSS.md / .json
REPORT_FILENAME_PREFIX="ops-log-monitor"

# LOG_FILE: Path for the script's own execution log. Records what the script
# did, errors encountered, and execution timing. Separate from the reports
# the script generates. Useful for troubleshooting cron-scheduled runs that
# are not producing expected output.
LOG_FILE="./logs/linux-monitor.log"

# MAX_LOG_SIZE_BYTES: Maximum size of the script execution log in bytes
# before it is rotated. The previous log is renamed with a .bak extension.
# Default is 10 MB.
MAX_LOG_SIZE_BYTES=10485760


# -----------------------------------------------------------------------------
# SECTION 2 — Monitoring Window Defaults
# -----------------------------------------------------------------------------
#
# These values define the default time window that reports cover when no
# --start-time or --end-time argument is passed to log-monitor.sh.
#
# MONITORING_WINDOW_HOURS: Number of hours back from the current time to
# search. Default of 24 is appropriate for daily scheduled runs. For a
# weekly summary report, set this to 168.
#
# journalctl accepts relative time specifications such as "24 hours ago"
# which is how this value is used internally. auditd queries use calculated
# epoch timestamps derived from this value.
MONITORING_WINDOW_HOURS=24

# MONITORING_WINDOW_MAX_LINES: Maximum number of lines to process from any
# single log source query. Prevents excessive memory use on systems with
# very high log volume. If a module consistently reaches this limit, consider
# shortening the window or investigating why volume is so high.
MONITORING_WINDOW_MAX_LINES=50000


# -----------------------------------------------------------------------------
# SECTION 3 — Business Hours Definition
# -----------------------------------------------------------------------------
#
# Business hours are used to identify authentication events outside expected
# working hours. An SSH login at 03:00 on a Tuesday warrants review even if
# it is not inherently malicious.
#
# All times are in the LOCAL timezone of the monitored system. If your
# environment spans multiple time zones, set ENFORCE_BUSINESS_HOURS="false"
# and perform after-hours review manually.

# BUSINESS_HOURS_START: First hour of the business day (24-hour format, 0-23)
BUSINESS_HOURS_START=7

# BUSINESS_HOURS_END: Last hour of the business day (24-hour format, 0-23)
# Authentications at or after this hour are considered after-hours.
BUSINESS_HOURS_END=19

# BUSINESS_DAYS: Days of the week considered working days.
# Uses values from the 'date +%u' command: 1=Monday through 7=Sunday.
# This differs from Windows DayOfWeek which starts at 0=Sunday.
BUSINESS_DAYS=("1" "2" "3" "4" "5")  # Monday through Friday

# ENFORCE_BUSINESS_HOURS: Set to "false" to disable after-hours detection.
# Appropriate for 24/7 operations environments.
ENFORCE_BUSINESS_HOURS="true"


# -----------------------------------------------------------------------------
# SECTION 4 — Module Enable/Disable Flags
# -----------------------------------------------------------------------------
#
# Each flag controls whether a specific event category module is executed.
# Set to "false" to skip a module entirely. Skipped modules produce no output
# section in the report. All modules are enabled by default.
#
# Reasons to disable a module:
#   - A required log source is not available (module returns empty results
#     anyway, but disabling it avoids misleading empty sections in the report
#     and reduces execution time)
#   - The event category generates too much expected noise in your environment
#   - You are testing a specific module in isolation

MODULE_AUTH_ENABLED="true"
MODULE_SERVICE_ENABLED="true"
MODULE_PRIVILEGE_ENABLED="true"
MODULE_SYSTEM_HEALTH_ENABLED="true"
MODULE_KERNEL_ENABLED="true"


# -----------------------------------------------------------------------------
# SECTION 5 — Log Source Paths
# -----------------------------------------------------------------------------
#
# These paths define where each log source is located. The defaults are
# correct for RHEL 9. If deploying on a Debian-based system (Ubuntu, Debian),
# several paths differ:
#   /var/log/secure       → /var/log/auth.log
#   /var/log/messages     → /var/log/syslog
#
# The main script checks whether each file exists before querying it and
# falls back to journald where possible when a file is absent.

# SECURE_LOG: Traditional auth log populated by rsyslog from journald.
# Used as a fallback when journald queries return unexpected results and
# for environments where rsyslog is the primary log system.
SECURE_LOG="/var/log/secure"

# MESSAGES_LOG: Traditional system messages log.
MESSAGES_LOG="/var/log/messages"

# AUDIT_LOG: auditd output file. This is the primary source for privilege
# events and SELinux AVC denials. Must be readable by the script's runtime
# user (requires root or appropriate ACL configuration).
AUDIT_LOG="/var/log/audit/audit.log"

# AUDIT_LOG_DIR: Directory containing rotated audit logs. Used when the
# monitoring window extends beyond what the current audit.log file contains.
# The framework will search rotated logs (audit.log.1, audit.log.2, etc.)
# if the requested window extends before the current file's start time.
AUDIT_LOG_DIR="/var/log/audit"

# CRON_DIRS: Directories monitored for new or modified cron job files.
# Changes to files in these directories during the monitoring window are
# reported as scheduled task events. Checked using find with -newer.
CRON_DIRS=(
    "/etc/cron.d"
    "/etc/cron.hourly"
    "/etc/cron.daily"
    "/etc/cron.weekly"
    "/etc/cron.monthly"
    "/var/spool/cron"
)

# SYSTEMD_TIMER_DIR: Directory containing systemd timer unit files.
# New .timer files appearing here during the monitoring window are reported.
SYSTEMD_TIMER_DIRS=(
    "/etc/systemd/system"
    "/usr/lib/systemd/system"
)


# -----------------------------------------------------------------------------
# SECTION 6 — Authentication Thresholds
# -----------------------------------------------------------------------------
#
# These thresholds determine when authentication failure counts are escalated
# from informational to WARN or CRIT severity.
#
# SSH brute force attempts frequently generate thousands of failures per hour
# from automated scanners. The defaults below are set to surface meaningful
# attack activity without flagging routine scanner noise as CRIT. Adjust
# based on the baseline failure rate observed in your environment.
#
# On internet-facing SSH servers, AUTH_FAILURE_WARN_THRESHOLD may need to
# be set significantly higher to avoid excessive WARN entries from routine
# background scanning. Consider whether the server should have SSH exposed
# to the internet at all, and whether fail2ban or similar tooling should
# be deployed as a complement to this monitoring framework.

# AUTH_FAILURE_WARN_THRESHOLD: Number of SSH authentication failures from
# a single source IP within the monitoring window before that source is
# reported at WARN severity.
AUTH_FAILURE_WARN_THRESHOLD=10

# AUTH_FAILURE_CRIT_THRESHOLD: Number of SSH authentication failures from
# a single source IP before it is reported at CRIT severity.
AUTH_FAILURE_CRIT_THRESHOLD=50

# AUTH_ACCOUNT_WARN_THRESHOLD: Number of failures targeting a single
# username before that account is reported at WARN severity. Targeted
# attacks against specific accounts are more concerning than distributed
# username enumeration.
AUTH_ACCOUNT_WARN_THRESHOLD=5

# AUTH_ACCOUNT_CRIT_THRESHOLD: Number of failures targeting a single
# username before CRIT severity.
AUTH_ACCOUNT_CRIT_THRESHOLD=20

# AUTH_INVALID_USER_CRIT_THRESHOLD: Number of attempts using usernames that
# do not exist on the system. High counts indicate username enumeration or
# a credential list built for a different target.
AUTH_INVALID_USER_CRIT_THRESHOLD=20

# AUTH_MONITOR_ROOT_SSH: Whether to flag any successful SSH authentication
# as the root account at CRIT severity. Direct root SSH login is a security
# risk and should be disabled in sshd_config (PermitRootLogin no).
# This flag detects if it is occurring even when it should be disabled.
# RHCSA Red Hat Enterprise Linux 9 Certification Study Guide (Jang) covers
# sshd_config hardening including PermitRootLogin configuration.
AUTH_MONITOR_ROOT_SSH="true"


# -----------------------------------------------------------------------------
# SECTION 7 — Expected Administrative Accounts
# -----------------------------------------------------------------------------
#
# EXPECTED_SUDO_USERS: Usernames that are expected to run sudo commands on
# this system. sudo executions by accounts not in this list are reported at
# elevated severity. This list should match the contents of /etc/sudoers
# and /etc/sudoers.d/ for accounts with unrestricted sudo access.
#
# This is a detection layer, not an enforcement layer. The actual sudo
# authorization is enforced by /etc/sudoers. This list tells the monitoring
# framework what is expected so it can flag deviations.
EXPECTED_SUDO_USERS=(
    "root"
    # Add site-specific administrator usernames here:
    # "jsmith"
    # "sysadmin"
    # "deploy-svc"
)

# EXPECTED_SU_USERS: Usernames that are expected to use su to switch to
# another account. su usage by accounts not in this list is reported at
# WARN severity.
EXPECTED_SU_USERS=(
    "root"
    # Add site-specific usernames here
)

# ROOT_CRON_EXPECTED: Whether cron jobs running as root are expected on
# this system. If "false", any root cron job found during the monitoring
# window is reported at WARN severity. If "true", root cron jobs are
# reported at INFO severity and only unexpected changes are flagged.
ROOT_CRON_EXPECTED="true"


# -----------------------------------------------------------------------------
# SECTION 8 — Security-Relevant Services
# -----------------------------------------------------------------------------
#
# SECURITY_RELEVANT_SERVICES: systemd unit names whose entry into the failed
# state is reported at CRIT severity rather than WARN. These are services
# whose failure has direct security or operational consequences.
#
# Use the unit name as it appears in 'systemctl list-units', including the
# .service suffix.
SECURITY_RELEVANT_SERVICES=(
    "sshd.service"          # SSH daemon — remote access
    "auditd.service"        # Audit daemon — security logging
    "firewalld.service"     # Firewall daemon
    "chronyd.service"       # Time synchronization — log timestamp integrity
    "rsyslog.service"       # System log forwarding
    "crond.service"         # Cron daemon — scheduled task execution
    # Add site-specific security-relevant services here:
    # "nginx.service"
    # "httpd.service"
    # "mysqld.service"
    # "postgresql.service"
)

# CRITICAL_SYSTEM_SERVICES: systemd unit names whose failure indicates a
# fundamental system problem rather than an application-level issue.
# These are reported at CRIT severity with a system stability warning.
CRITICAL_SYSTEM_SERVICES=(
    "dbus.service"          # D-Bus message bus — required by most services
    "NetworkManager.service" # Network management
    "systemd-journald.service" # Journal daemon — if this fails, logging stops
    "systemd-logind.service"   # Login manager
)


# -----------------------------------------------------------------------------
# SECTION 9 — SELinux Settings
# -----------------------------------------------------------------------------
#
# SELINUX_MONITOR_ENABLED: Whether to include SELinux AVC denial monitoring.
# Automatically set to "false" if getenforce returns "Disabled" at runtime,
# regardless of this setting. Setting this to "false" explicitly skips the
# check entirely rather than failing when SELinux is not available.
SELINUX_MONITOR_ENABLED="true"

# SELINUX_DENIAL_WARN_THRESHOLD: Number of AVC denials from a single source
# context (process type) within the monitoring window before that context is
# reported at WARN severity. A small number of AVC denials from a known
# application after a package update is expected. A burst of denials from
# an unexpected process is not.
SELINUX_DENIAL_WARN_THRESHOLD=5

# SELINUX_DENIAL_CRIT_THRESHOLD: Number of AVC denials from a single source
# context before CRIT severity.
SELINUX_DENIAL_CRIT_THRESHOLD=25

# SELINUX_KNOWN_NOISY_CONTEXTS: SELinux source contexts that are known to
# generate AVC denials as a result of policy gaps rather than actual security
# events. Denials from these contexts are still reported but are marked as
# INFO rather than WARN or CRIT. Use this to suppress noise from known-benign
# policy gaps while the appropriate policy fix is developed and deployed.
#
# This list should be reviewed and cleared after each policy update.
# Leaving known-noisy contexts in this list indefinitely defeats the purpose
# of SELinux monitoring.
SELINUX_KNOWN_NOISY_CONTEXTS=(
    # Example — remove or replace with site-specific known-noisy contexts:
    # "system_u:system_r:NetworkManager_t:s0"
)


# -----------------------------------------------------------------------------
# SECTION 10 — Kernel Message Filters
# -----------------------------------------------------------------------------
#
# KERNEL_ERROR_PATTERNS: grep extended regex patterns that identify kernel
# messages to extract from journald --dmesg output. These are the patterns
# that indicate genuine kernel-level problems rather than informational
# messages. The defaults cover the most operationally significant categories.
#
# Patterns are applied with grep -E (extended regex, case-insensitive).
KERNEL_ERROR_PATTERNS=(
    "Out of memory"
    "oom.kill"
    "Killed process"
    "I/O error"
    "Buffer I/O error"
    "blk_update_request"
    "EXT4-fs error"
    "XFS.*error"
    "ata[0-9]+\.[0-9]+: error"
    "SCSI error"
    "nvme.*error"
    "kernel panic"
    "Oops:"
    "BUG:"
    "general protection fault"
    "soft lockup"
    "hard lockup"
    "RCU stall"
    "Call Trace:"
)

# KERNEL_SUPPRESS_PATTERNS: Patterns matching kernel messages that are known
# to be benign in this environment and should be excluded from the report.
# Applied after KERNEL_ERROR_PATTERNS to filter out known false positives.
#
# Example: some virtualization platforms generate I/O error messages during
# normal balloon driver operation that match the error patterns above.
# Adding a suppression pattern for those specific messages prevents them
# from appearing in every report.
KERNEL_SUPPRESS_PATTERNS=(
    # Example suppressions — replace with site-specific patterns:
    # "virtio_balloon"
    # "blk_update_request.*loop[0-9]"
)

# OOM_KILL_ALWAYS_CRIT: Whether OOM kill events are always reported at CRIT
# severity regardless of the process killed. OOM kills indicate the system
# does not have sufficient memory for its current workload and may be causing
# data loss. Recommended to leave as "true" in most environments.
OOM_KILL_ALWAYS_CRIT="true"


# -----------------------------------------------------------------------------
# SECTION 11 — Report Metadata
# -----------------------------------------------------------------------------
#
# MONITOR_VERSION: Version of this configuration file. Increment when making
# significant changes to thresholds or module settings so that reports
# generated before and after a configuration change can be distinguished.
MONITOR_VERSION="1.0.0"

# MONITOR_DESCRIPTION: Short description included in report headers.
MONITOR_DESCRIPTION="Linux Operational Log Monitor"

# REPORT_INCLUDE_SYSTEM_INFO: Whether to include system information (OS
# version, kernel version, uptime, last boot time) in the report header.
# Adds a small amount of execution time for the additional queries.
REPORT_INCLUDE_SYSTEM_INFO="true"

# REQUIRE_ROOT: Whether to exit with an error if the script is not run as
# root. Some modules (auditd log reading, certain journald queries) require
# root access. Setting this to "false" allows non-root execution but those
# modules will fail with permission errors and produce empty output sections.
# For scheduled cron runs, "true" is strongly recommended.
REQUIRE_ROOT="true"